report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Analysis of quality, alignment, and peak calling."
title: "ATAC-seq/ChIP-seq Analysis Report"

# 1. Rimuovi parent_id da custom_content per non bloccarli in cima
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools

report_section_order:
  # --- SEZIONI STANDARD ---
  fastqc:
    order: -100
  cutadapt:
    order: -200
  bowtie2:
    order: -300
  # SAMTOOLS: L'id del grafico statistico è 'samtools-stats'
  samtools-stats:
    order: -400
  # PICARD: L'id delle metriche dei duplicati
  picard-markduplicates:
    order: -500

  # --- SEZIONI CUSTOM (In ordine decrescente come volevi) ---
  macs3_narrow_count:
    order: -600
  macs3_broad_count:
    order: -700
  diffbind_profile:
    order: -800
  frip_score:
    order: -900
  # HOMER: IDs definiti dai tuoi echo nel processo
  homer_annotations_narrow:
    order: -1000
  homer_annotations_broad:
    order: -1010
  # DEEPTOOLS: L'id generato da plotFingerprint
  deeptools_fingerprint:
    order: -1100
  # SOFTWARE VERSIONS: Deve corrispondere all'id in custom_data
  software_versions:
    order: -1200

custom_data:
  # IMPORTANTE: No parent_id qui!
  software_versions:
    section_name: "Software Versions"
  diffbind_profile:
    section_name: "DiffBind: Differential Binding Profile"
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
  homer_annotations_narrow:
    section_name: "Annotation: Genomic Distribution (Narrow)"
    plot_type: "bargraph"
  homer_annotations_broad:
    section_name: "Annotation: Genomic Distribution (Broad)"
    plot_type: "bargraph"

sp:
  software_versions:
    fn: "collated_versions.yml"
  homer_annotations_narrow:
    fn: "*.homer_stats_mqc.txt"
  homer_annotations_broad:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"

sample_names_replace_suffixes:
  - ".plotFingerprint.qcmetrics"
  - ".plotFingerprint.raw"
  - ".homer_stats_mqc"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".stats"
  - ".flagstat"
  - ".idxstats"
