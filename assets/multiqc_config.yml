report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Analysis of quality, alignment, and peak calling."
title: "ATAC-seq/ChIP-seq Analysis Report"

# Rimuove moduli non desiderati (come il riconoscimento errato di MACS2)
run_modules:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - deeptools
  - custom_content
  
# Ordine dei moduli principali
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools
  - software_versions

# Ordine specifico delle sezioni (più alto è il numero, più in basso va)
report_section_order:
  fastqc:
    order: -100
  cutadapt:
    order: -200
  bowtie2:
    order: -300
  samtools:
    order: -400
  picard:
    order: -500
  macs3_narrow_count:
    order: -600
  macs3_broad_count:
    order: -700
  diffbind_profile:
    order: -800
  frip_score:
    order: -900
  homer_annotations:
    order: -1000
  deeptools:
    order: -1100
  software_versions:
    order: -1200

custom_data:
  diffbind_profile:
    parent_id: "diffbind"
    section_name: "DiffBind: Differential Binding Profile"
    description: "Heatmap of signal intensity at differential binding sites."
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Narrow)"
      ylab: "Number of Peaks"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Broad)"
      ylab: "Number of Peaks"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
    pconfig:
      title: "FRiP Score per Sample"
      ylab: "FRiP Score"
      max: 1
  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"
    pconfig:
      title: "Peak Distribution (%)"
      stacking: "percent"

sp:
  diffbind_profile:
    fn: "*_mqc.html"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"
  software_versions:
    fn: "collated_versions.yml"

sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats_mqc"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
  - ".annotatePeaks"
  - "_mqc"
