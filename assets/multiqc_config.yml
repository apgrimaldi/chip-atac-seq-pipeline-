report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Analysis of quality, alignment, and peak calling."
title: "ATAC-seq/ChIP-seq Analysis Report"

module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools

report_section_order:
  fastqc: {order: -100}
  cutadapt: {order: -200}
  bowtie2: {order: -300}
  
  # SAMTOOLS: Usiamo l'ID con l'underscore che MultiQC ha assegnato nel tuo report
  samtools_stats: {order: -400}
  
  # PICARD: L'ID esatto nel tuo JSON è picard_mark_duplicates
  # Usando questo, Picard starà finalmente sotto Samtools e non in cima.
  picard_mark_duplicates: {order: -500}

  # SEZIONI CUSTOM (MACS3 ora visibili)
  macs3_narrow_count: {order: -600}
  macs3_broad_count: {order: -700}
  
  # DIFFBIND: Heatmap Interattiva
  diffbind_heatmap: {order: -800}
  
  # Il tuo profilo HTML esistente
  diffbind_profile: {order: -810}
  
  frip_score: {order: -900}
  homer_annotations_narrow: {order: -1000}
  homer_annotations_broad: {order: -1010}
  
  # DEEPTOOLS: Usiamo l'ID dei file counts che hai caricato
  deeptools_plot_fingerprint_counts: {order: -1100}
  
  software_versions: {order: -1200}

custom_data:
  software_versions:
    section_name: "Software Versions"
  
  # HEATMAP DIFFBIND (Basata sul file .txt che abbiamo aggiunto a R)
  diffbind_heatmap:
    section_name: "DiffBind: Sample Correlation Heatmap"
    plot_type: "heatmap"
    pconfig:
      title: "Sample Correlation"
      decimalPlaces: 2
      
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
  homer_annotations_narrow:
    section_name: "Annotation: Genomic Distribution (Narrow)"
    plot_type: "bargraph"
  homer_annotations_broad:
    section_name: "Annotation: Genomic Distribution (Broad)"
    plot_type: "bargraph"

sp:
  # Assicurati che i nomi dei file corrispondano a quelli prodotti dai processi
  software_versions: {fn: "collated_versions.yml"}
  diffbind_heatmap: {fn: "diffbind_correlation_mqc.txt"}
  homer_annotations_narrow: {fn: "*.homer_stats_mqc.txt"}
  homer_annotations_broad: {fn: "*.homer_stats_mqc.txt"}
  frip_score: {fn: "*.FRiP.txt"}
  macs3_narrow_count: {fn: "*.narrow_counts.txt"}
  macs3_broad_count: {fn: "*.broad_counts.txt"}

sample_names_replace_suffixes:
  - ".plotFingerprint.qcmetrics"
  - ".plotFingerprint.raw"
  - ".homer_stats_mqc"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".stats"
  - ".flagstat"
  - ".idxstats"
  - ".metrics"
  - ".removed"
