report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Analysis of quality, alignment, and peak calling."
title: "ATAC-seq/ChIP-seq Analysis Report"

run_modules:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - deeptools
  - custom_content

module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools

report_section_order:
  fastqc:
    order: -100
  cutadapt:
    order: -200
  bowtie2:
    order: -300
  samtools:
    order: -400
  picard:
    order: -500
  macs3_narrow_count:
    order: -600
  macs3_broad_count:
    order: -700
  diffbind_profile:
    order: -800
  frip_score:
    order: -900
  homer_annotations:
    order: -1000
  deeptools_fingerprint:
    order: -1100
  deeptools_profile:
    order: -1110
  software_versions:
    order: -1200

custom_data:
  software_versions:
    section_name: "Software Versions"
    parent_id: "custom_content"
    description: "Software versions used in the pipeline"
  diffbind_profile:
    parent_id: "diffbind"
    section_name: "DiffBind: Differential Binding Profile"
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Narrow)"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Broad)"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
    pconfig:
      title: "FRiP Score per Sample"
  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"

sp:
  software_versions:
    fn: "collated_versions.yml"
  diffbind_profile:
    fn: "*_mqc.html"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"

sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats_mqc"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
  - ".annotatePeaks"
  - "_mqc"
