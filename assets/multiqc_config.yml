report_comment: >
  This report has been generated by the ATAC/ChIP-seq analysis pipeline.
title: "ATAC-seq/ChIP-seq Analysis Report"

data_format: "yaml"
export_plots: true

# 1. Rimuoviamo la tabella in alto che ruba la priorità ai moduli
exclude_modules:
  - "general_stats"

# 2. Definiamo l'ordine dei moduli con le ancore (stile nf-core)
module_order:
  - fastqc:
      name: "FastQC"
  - cutadapt:
      name: "Cutadapt"
  - bowtie2:
      name: "Bowtie2"
  - samtools:
      name: "SAMTools"
  - picard:
      name: "Picard"
  - custom_content:
      name: "Analysis Results"
      anchor: "analysis_results"
  - deeptools:
      name: "deepTools"
      anchor: "deeptools_results"

# 3. Ordiniamo le sezioni usando "before" e "order" molto alti (negativi)
report_section_order:
  # Sezioni custom messe in ordine specifico
  macs3_narrow_count:
    order: -100
  macs3_broad_count:
    order: -200
  diffbind_profile:
    order: -300
  frip_score:
    order: -400
  homer_annotations:
    order: -500
  # Mandiamo le versioni e i deeptools in fondo come nf-core
  deeptools_results:
    order: -600
  software_versions:
    order: -700

custom_data:
  software_versions:
    section_name: "Software Versions"
    parent_id: "custom_content"
  diffbind_profile:
    section_name: "DiffBind: Differential Binding Profile"
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"

sp:
  software_versions:
    fn: "collated_versions.yml"
  diffbind_profile:
    fn: "*_mqc.html"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"

# Escludiamo i file di MACS2 che disturbano
fn_ignore_files:
  - "*_peaks.xls"

extra_fn_clean_exts:
  - "fastq.gz"
  - "_trimmed"
  - "_val"
  - "sorted.bam"
  - "_peaks"
  - ".FRiP"
  - "_mqc"  macs3_narrow_count:
    order: -600
  macs3_broad_count:
    order: -700
  diffbind_profile:
    order: -800
  frip_score:
    order: -900
  homer_annotations:
    order: -1000
  deeptools_fingerprint:
    order: -1100
  deeptools_profile:
    order: -1110
  software_versions:
    order: -1200

custom_data:
  software_versions:
    section_name: "Software Versions"
    parent_id: "custom_content"
    description: "Software versions used in the pipeline"
  diffbind_profile:
    parent_id: "custom_content"
    section_name: "DiffBind: Differential Binding Profile"
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Narrow)"
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Broad)"
  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
    pconfig:
      title: "FRiP Score per Sample"
  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"

sp:
  software_versions:
    fn: "collated_versions.yml"
  diffbind_profile:
    fn: "*_mqc.html"
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"

sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats_mqc"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
  - ".annotatePeaks"
  - "_mqc"
