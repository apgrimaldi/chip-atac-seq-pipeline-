report_comment: "Report generated by the ATAC/ChIP-seq pipeline."
title: "ATAC-seq/ChIP-seq Analysis Report"

# Ignora i file che attivano MACS2 non voluto
fn_ignore_files:
  - "*_peaks.xls"
  - "macs2_report.txt"

module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - custom_content
  - deeptools

report_section_order:
  fastqc: {order: -100}
  cutadapt: {order: -200}
  bowtie2: {order: -300}
  
  # SAMTOOLS - Qui gestisci le due sezioni
  samtools-stats: {order: -400}
  samtools-flagstat: {order: -410}
  samtools-idxstats: {order: -420}
  
  picard-markduplicates: {order: -500}
  
  # I TUOI CUSTOM (MACS3, FRiP, HOMER)
  macs3_narrow_count: {order: -600}
  macs3_broad_count: {order: -700}
  frip_score: {order: -900}
  homer_annotations_narrow: {order: -1000}
  homer_annotations_broad: {order: -1010}
  
  # DEEPTOOLS - ID specifici per spostarlo in fondo
  deeptools_fingerprint: {order: -1100}
  deeptools_qc_metrics: {order: -1110}
  
  # SOFTWARE VERSIONS
  software_versions: {order: -1200}

custom_data:
  # Assicurati che NON ci sia parent_id: custom_content
  software_versions:
    section_name: "Software Versions"
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
  # ... (resto del tuo custom_data senza parent_id)
