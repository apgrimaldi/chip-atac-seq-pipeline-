report_comment: "Report generated by the ATAC/ChIP-seq pipeline. Analysis of quality, alignment, and peak calling."
title: "ATAC-seq/ChIP-seq Analysis Report"

# --- 1. MODULE ORDER (Standard IDs) ---
module_order:
  - fastqc
  - cutadapt
  - bowtie2
  - samtools
  - picard
  - deeptools
  - custom_content

# --- 2. REPORT SECTION ORDER (The "Before" Chain) ---
report_section_order:
  fastqc:
    order: -1000
  cutadapt:
    order: -900
  bowtie2:
    order: -800
  samtools:
    order: -700
  picard:
    order: -600
  # We place scientific results BEFORE the deeptools plots
  homer_annotations:
    before: deeptools
  frip_score:
    before: homer_annotations
  macs3_narrow_count:
    before: frip_score
  macs3_broad_count:
    before: macs3_narrow_count
  deeptools:
    order: -500
  software_versions:
    order: -100

# --- 3. CUSTOM DATA CONFIGURATION ---
custom_data:
  macs3_narrow_count:
    section_name: "MACS3: Narrow Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Narrow)"
      ylab: "Number of Peaks"
  
  macs3_broad_count:
    section_name: "MACS3: Broad Peak Count"
    plot_type: "bargraph"
    pconfig:
      title: "Total Peak Count (Broad)"
      ylab: "Number of Peaks"

  frip_score:
    section_name: "QC: FRiP Score"
    plot_type: "bargraph"
    pconfig:
      title: "FRiP Score per Sample"
      ylab: "FRiP Score"
      max: 1

  homer_annotations:
    section_name: "Annotation: Genomic Distribution"
    plot_type: "bargraph"
    pconfig:
      title: "Peak Distribution (%)"
      stacking: "percent"
      colors:
        "promoter-TSS": "#f15c80"
        "Promoter-TSS": "#f15c80"
        "Intergenic": "#7cb5ec"
        "TTS": "#434348"
        "exon": "#f7a35c"
        "intron": "#8085e9"

# --- 4. SEARCH PATTERNS ---
sp:
  homer_annotations:
    fn: "*.homer_stats_mqc.txt"
  frip_score:
    fn: "*.FRiP.txt"
  macs3_narrow_count:
    fn: "*.narrow_counts.txt"
  macs3_broad_count:
    fn: "*.broad_counts.txt"

# --- 5. SAMPLE NAME CLEANUP ---
sample_names_replace_suffixes:
  - "_narrow"
  - "_broad"
  - ".narrow_counts"
  - ".broad_counts"
  - ".FRiP"
  - ".homer_stats_mqc"
  - "_peaks"
  - ".stats"
  - ".sorted"
  - ".filtered"
  - "_val_1"
  - "_val_2"
  - ".fingerprint"
  - ".annotatePeaks"
